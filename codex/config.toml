#:schema https://raw.githubusercontent.com/openai/codex/refs/heads/main/codex-rs/core/config.schema.json

model = "gpt-5.5"
review_model = "gpt-5.5"
# model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
model_auto_compact_token_limit_scope = "total"
approval_policy = "never"
tool_output_token_limit = 40000
project_doc_max_bytes = 46080
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md", "GEMINI.md"]
allow_login_shell = true
hide_agent_reasoning = false
show_raw_agent_reasoning = true
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
model_supports_reasoning_summaries = true
check_for_update_on_startup = false
sandbox_mode = "danger-full-access"
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
web_search = "live"
project_root_markers = [".git"]
suppress_unstable_features_warning = true
approvals_reviewer = "guardian_subagent"
include_permissions_instructions = true
include_apps_instructions = true
include_environment_context = true
personality = "none"
# personality = "pragmatic"
service_tier = "priority"
disable_paste_burst = true
developer_instructions = "You have oh-my-codex installed through Codex plugin mode. AGENTS.md is the orchestration brain and main control surface. Follow AGENTS.md for skill/keyword routing and $name workflow invocation. When spawning native subagents, set `agent_type` to an installed role and never omit it for OMX work. Registered Codex plugin marketplace surfaces supply OMX workflows and plugin-scoped companion resources when the plugin is installed; native agent roles are installed as setup-owned Codex agent TOML files in plugin mode so agent_type routing works. User-installed skills may still live under ~/.codex/skills. Use outcome-first, concise progress updates: state the target result, constraints, validation evidence, and stop condition before adding process detail."
notify = ["/Users/zchee/src/github.com/zchee/agent/codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[desktop]
sansFontSize = 18
codeFontSize = 16
usePointerCursors = true
dictationDictionary = []
composerEnterBehavior = "cmdIfMultiline"
reviewDelivery = "detached"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "codex-"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
notifications-turn-mode = "always"
dock-icon-preference = "app-default"
appearanceTheme = "system"
show-context-window-usage = true
hotkey-window-projectless-default-enabled = true
useFontSmoothing = true
appshotSoundEnabled = true
followUpQueueMode = "queue"

[desktop.appearanceLightChromeTheme]
accent = "#339cff"
contrast = 45
ink = "#1a1c1f"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]
code = "MonoLisaCode"
ui = "MonoLisaText"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#ba2623"
skill = "#924ff7"

[desktop.appearanceDarkChromeTheme]
accent = "#339cff"
contrast = 60
ink = "#ffffff"
opaqueWindows = false
surface = "#181818"

[desktop.appearanceDarkChromeTheme.fonts]
code = "MonoLisaCode"
ui = "MonoLisaText,-apple-system"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#40c977"
diffRemoved = "#fa423e"
skill = "#ad7bf9"

[model_providers.oai]
name = "openai"
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
supports_websockets = true

[model_providers.openrouter]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "responses"

[model_providers.xai]
name = "xai"
base_url = "https://api.x.ai/v1"
env_key = "XAI_API_KEY"
wire_api = "responses"
supports_websockets = true

[experimental_thread_store]
type = "local"

[realtime]
version = "v2"
transport = "webrtc"
type = "conversational"

[shell_environment_policy]
inherit = "all"
experimental_use_profile = false

[shell_environment_policy.set]
OMX_LORE_COMMIT_GUARD = "0"

[history]
persistence = "save-all"
max_bytes = 104857600

[tui]
notifications = true
notification_method = "osc9"
notification_condition = "always"
animations = true
alternate_screen = "always"
show_tooltips = true
# https://github.com/openai/codex/blob/main/codex-rs/tui/src/bottom_pane/status_line_setup.rs
status_line = ["model-with-reasoning", "git-branch", "current-dir", "context-remaining", "context-window-size", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[tools.web_search]
context_size = "high"

[agents]
max_depth = 4

[memories]
generate_memories = true
use_memories = true
max_unused_days = 21
max_rollout_age_days = 42
max_rollouts_per_startup = 9
min_rollout_idle_hours = 24
disable_on_external_context = false
extract_model = "gpt-5.3-codex-spark"
consolidation_model = "gpt-5.5"

[features]
shell_zsh_fork = false
unified_exec_zsh_fork = false
deferred_executor = true
code_mode = false
code_mode_host = true
code_mode_only = false
standalone_web_search = true
runtime_metrics = true
memories = true
local_thread_store_compression = true
chronicle = true
apply_patch_streaming_events = true
exec_permission_approvals = true
request_permissions_tool = true
network_proxy = true
respect_system_proxy = true
enable_fanout = true
apps = false
enable_mcp_apps = true
non_prefixed_mcp_tool_names = true
imagegenext = false
item_ids = false
default_mode_request_user_input = true
terminal_visualization_instructions = true
token_budget = false
current_time_reminder = true
auth_elicitation = true
realtime_conversation = true
prevent_idle_sleep = true
use_agent_identity = true
js_repl = false

# [features.rollout_budget]
# enabled = true
# limit_tokens = 100000
# reminder_at_remaining_tokens = 100000
# reminder_at_remaining_tokens = 100

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 50
hide_spawn_agent_metadata = false
non_code_mode_only = false

[orchestrator.skills]
