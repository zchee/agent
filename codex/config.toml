# https://github.com/openai/codex/blob/main/codex-rs/features/src/lib.rs
[features]
shell_zsh_fork = true
code_mode = true
code_mode_only = false
codex_git_commit = true
runtime_metrics = true
memories = true
chronicle = true
child_agents_md = true
apply_patch_freeform = true
apply_patch_streaming_events = true
exec_permission_approvals = true
request_permissions_tool = true
enable_fanout = true
enable_mcp_apps = true
apps_mcp_path_override = true
tool_search_always_defer_mcp_tools = true
plugin_hooks = true
remote_plugin = true
external_migration = false
skill_env_var_dependency_prompt = true
default_mode_request_user_input = true
goals = true
realtime_conversation = true
remote_control = true
prevent_idle_sleep = true
workspace_owner_usage_nudge = true

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 6
usage_hint_enabled = true
hide_spawn_agent_metadata = false

[analytics]
enabled = false

[feedback]
enabled = false

[notice]
