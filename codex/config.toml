# oh-my-codex top-level settings (must be before any [table])
notify = ["node", "/opt/local/var/bun/install/global/node_modules/oh-my-codex/dist/scripts/notify-hook.js"]
model_reasoning_effort = "high"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is your orchestration brain and the main orchestration surface. Use skill/keyword routing like $name plus spawned role-specialized subagents for specialized work. Codex native subagents are available via .codex/agents and may be used for independent parallel subtasks within a single session or team pane. Skills are loaded from installed SKILL.md files under .codex/skills, not from native agent TOMLs. Use workflow skills via $name when explicitly invoked or clearly routed by AGENTS.md. Treat installed prompts as narrower internal execution surfaces under AGENTS.md authority, even when user-facing docs prefer $name keywords."

model = "gpt-5.4"
review_model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
project_doc_max_bytes = 46080
project_doc_fallback_filenames = [ "AGENTS.md", "CLAUDE.md", "GEMINI.md" ]
js_repl_node_path = "/opt/homebrew/bin/node"
zsh_path = "/opt/homebrew/bin/zsh"
hide_agent_reasoning = false
show_raw_agent_reasoning = true
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
model_supports_reasoning_summaries = true
check_for_update_on_startup = false
approval_policy = "on-request"
sandbox_mode = "workspace-write"
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
web_search = "live"
project_root_markers = [ ".git" ]
suppress_unstable_features_warning = true
approvals_reviewer = "guardian_subagent"
service_tier = "fast"

[realtime]
version = "v2"

[shell_environment_policy]
inherit = "all"
experimental_use_profile = false

[tui]
notifications = true
animations = true
alternate_screen = "always"
status_line = [ "model-with-reasoning", "context-remaining", "context-used", "current-dir", "git-branch", "five-hour-limit", "weekly-limit", "context-window-size", "used-tokens", "total-input-tokens", "total-output-tokens", "session-id" ]

[tools]
view_image = true

[agents]
max_threads = 6
max_depth = 3

[memories]
generate_memories = true
use_memories = true
max_unused_days = 21
max_rollout_age_days = 42
max_rollouts_per_startup = 9
min_rollout_idle_hours = 24

[features]
undo = true
unified_exec = true
shell_zsh_fork = true
js_repl = true
js_repl_tools_only = false
code_mode = true
codex_git_commit = true
runtime_metrics = true
general_analytics = true
sqlite = true
memories = true
child_agents_md = true
image_detail_original = true
apply_patch_freeform = true
exec_permission_approvals = true
codex_hooks = true
request_permissions_tool = true
multi_agent_v2 = true
enable_fanout = true
tool_search = true
default_mode_request_user_input = true
guardian_approval = true
artifact = true
realtime_conversation = true
prevent_idle_sleep = true

multi_agent = true
[ghost_snapshot]
disable_warnings = true

[analytics]
enabled = false

[feedback]
enabled = false

[notice]
hide_full_access_warning = true
hide_gpt5_1_migration_prompt = true
hide_rate_limit_model_nudge = false
hide_world_writable_warning = false

[notice.hide_gpt-5]
1-codex-max_migration_prompt = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[model_providers.xai]
name = "xAI"
base_url = "https://api.x.ai/v1"
env_key = "XAI_API_KEY"

[profiles.xai]
