#:schema https://raw.githubusercontent.com/openai/codex/refs/heads/main/codex-rs/core/config.schema.json

# oh-my-codex top-level settings (must be before any [table])
notify = ["node", "--max-old-space-size=4096", "/opt/local/var/bun/install/global/node_modules/oh-my-codex/dist/scripts/notify-hook.js"]
model_reasoning_effort = "medium"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is the orchestration brain and main control surface. Follow AGENTS.md for skill/keyword routing, $name workflow invocation, and role-specialized subagents. Use outcome-first, concise progress updates: state the target result, constraints, validation evidence, and stop condition before adding process detail. Native subagents live in .codex/agents and may handle independent parallel subtasks within one Codex session or team pane. Skills load from .codex/skills, not native-agent TOMLs. Treat installed prompts as narrower execution surfaces under AGENTS.md authority."
model = "gpt-5.5"
# oh-my-codex seeded behavioral defaults (uninstall removes unchanged defaults)
# model_context_window = 500000
# model_auto_compact_token_limit = 450000
# End oh-my-codex seeded behavioral defaults

review_model = "gpt-5.5"
model_context_window = 250000
model_auto_compact_token_limit = 200000
# model_context_window = 1000000
# model_auto_compact_token_limit = 900000
approval_policy = "never"
tool_output_token_limit = 40000
project_doc_max_bytes = 46080
project_doc_fallback_filenames = [ "AGENTS.md", "CLAUDE.md", "GEMINI.md" ]
zsh_path = "/opt/homebrew/bin/zsh"
hide_agent_reasoning = false
show_raw_agent_reasoning = true
model_reasoning_summary = "auto"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
model_supports_reasoning_summaries = true
check_for_update_on_startup = false
sandbox_mode = "danger-full-access"
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
web_search = "live"
project_root_markers = [ ".git" ]
suppress_unstable_features_warning = true
approvals_reviewer = "guardian_subagent"
include_permissions_instructions = true
include_apps_instructions = true
include_environment_context = true
personality = "pragmatic"
service_tier = "fast"

[experimental_thread_store]
type = "local"

[model_providers.openrouter]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_CODEX_API_KEY"
wire_api = "responses"

[model_providers.xai]
name = "xai"
base_url = "https://api.x.ai/v1"
env_key = "XAI_API_KEY"

[profiles.openai]
model_provider = "openrouter"
model = "openai/gpt-5.5-pro"
service_tier = "fast"

[profiles.openrouter]
model_provider = "openrouter"
model = "minimax/minimax-m2.7"

[profiles.gemini]
model_provider = "openrouter"
model = "google/gemini-3.1-pro-preview-customtools"

[profiles.claude]
model_provider = "openrouter"
model = "anthropic/claude-opus-4.7"

[profiles.xai]
model_provider = "xai"
model = "grok-4.20-multi-agent-beta-latest"

[realtime]
version = "v2"
transport = "webrtc"
type = "conversational"

[shell_environment_policy]
inherit = "all"
experimental_use_profile = false

[shell_environment_policy.set]
USE_OMX_EXPLORE_CMD = "1"

[history]
persistence = "save-all"

[tui]
notifications = true
animations = true
alternate_screen = "always"
# https://github.com/openai/codex/blob/main/codex-rs/tui/src/bottom_pane/status_line_setup.rs
# status_line = [ "model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit" ]
status_line = ["model-with-reasoning", "git-branch", "current-dir", "context-remaining", "total-input-tokens", "total-output-tokens", "context-window-size", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[tools]
view_image = true

[tools.web_search]
context_size = "high"

[agents]
max_depth = 2

[memories]
generate_memories = true
use_memories = true
max_unused_days = 21
max_rollout_age_days = 42
max_rollouts_per_startup = 9
min_rollout_idle_hours = 24
disable_on_external_context = true
extract_model = "gpt-5.3-codex-spark"
consolidation_model = "gpt-5.5"

# [debug.config_lockfile]
# /// Directory where Codex writes effective session config lock files.
# pub export_dir: Option<AbsolutePathBuf>,
# /// Lockfile to replay as the authoritative effective config.
# pub load_path: Option<AbsolutePathBuf>,
