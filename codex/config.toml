#:schema https://raw.githubusercontent.com/openai/codex/refs/heads/main/codex-rs/core/config.schema.json
model = "gpt-5.5"
review_model = "gpt-5.5"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
tool_output_token_limit = 40000
project_doc_max_bytes = 46080
project_doc_fallback_filenames = [ "AGENTS.md", "CLAUDE.md", "GEMINI.md" ]
zsh_path = "/opt/homebrew/bin/zsh"
hide_agent_reasoning = false
show_raw_agent_reasoning = true
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
model_supports_reasoning_summaries = true
check_for_update_on_startup = false
approval_policy = "never"
sandbox_mode = "danger-full-access"
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
web_search = "live"
project_root_markers = [ ".git" ]
suppress_unstable_features_warning = true
approvals_reviewer = "guardian_subagent"
include_permissions_instructions = true
include_apps_instructions = true
include_environment_context = true
# personality = "pragmatic"
# service_tier = "fast"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is your orchestration brain and the main orchestration surface. Use skill/keyword routing like $name plus spawned role-specialized subagents for specialized work. Codex native subagents are available via .codex/agents and may be used for independent parallel subtasks within a single session or team pane. Skills are loaded from installed SKILL.md files under .codex/skills, not from native agent TOMLs. Use workflow skills via $name when explicitly invoked or clearly routed by AGENTS.md. Treat installed prompts as narrower internal execution surfaces under AGENTS.md authority, even when user-facing docs prefer $name keywords."

[experimental_thread_store]
type = "local"

[model_providers.openrouter]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_CODEX_API_KEY"
wire_api = "responses"

[model_providers.xai]
name = "xai"
base_url = "https://api.x.ai/v1"
env_key = "XAI_API_KEY"

[profiles.openai]
model_provider = "openrouter"
model = "openai/gpt-5.5-pro"
service_tier = "fast"

[profiles.openrouter]
model_provider = "openrouter"
model = "minimax/minimax-m2.7"

[profiles.gemini]
model_provider = "openrouter"
model = "google/gemini-3.1-pro-preview-customtools"

[profiles.claude]
model_provider = "openrouter"
model = "anthropic/claude-opus-4.7"

[profiles.xai]
model_provider = "xai"
model = "grok-4.20-multi-agent-beta-latest"

[realtime]
version = "v2"
transport = "webrtc"
type = "conversational"

[shell_environment_policy]
inherit = "all"
experimental_use_profile = false

[shell_environment_policy.set]
USE_OMX_EXPLORE_CMD = "1"

[history]
persistence = "save-all"
max_bytes = 104857600

[tui]
notifications = true
animations = true
alternate_screen = "always"
# github.com/openai/codex/codex-rs/tui/src/bottom_pane/title_setup.rs#TerminalTitleItem
status_line = [ "model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit" ]

[tui.model_availability_nux]
"gpt-5.5" = 4

[tools]
view_image = true

[tools.web_search]
context_size = "high"

[agents]
max_depth = 5

[memories]
generate_memories = true
use_memories = true
max_unused_days = 21
max_rollout_age_days = 42
max_rollouts_per_startup = 9
min_rollout_idle_hours = 24

[features]
undo = true
shell_zsh_fork = true
code_mode = true
code_mode_only = true
codex_git_commit = true
runtime_metrics = true
memories = true
chronicle = true
apply_patch_freeform = true
apply_patch_streaming_events = true
exec_permission_approvals = true
request_permissions_tool = true
enable_fanout = true
tool_search_always_defer_mcp_tools = true
remote_plugin = true
external_migration = true
skill_env_var_dependency_prompt = true
default_mode_request_user_input = true
goals = true
realtime_conversation = true
remote_control = true
prevent_idle_sleep = true
workspace_owner_usage_nudge = true
enable_mcp_apps = true
plugin_hooks = true
apps_mcp_path_override = true

codex_hooks = true
[features.multi_agent_v2]
enabled = true
usage_hint_enabled = false
hide_spawn_agent_metadata = false

[ghost_snapshot]
disable_warnings = true

[analytics]
enabled = false

[feedback]
enabled = false

[notice]
hide_full_access_warning = true
hide_gpt5_1_migration_prompt = true
hide_rate_limit_model_nudge = false
hide_world_writable_warning = false

[notice.external_config_migration_prompts]
home_last_prompted_at = 1777068132

